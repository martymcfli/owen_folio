<head>
    <meta charset="UTF-8">

    <script src="../lang.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f25;
            --bg-chat: #1c2127;
            --border: #2d3748;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #14b8a6;
            --accent-hover: #0d9488;
            --user-bubble: #14b8a6;
            --ai-bubble: #2d3748;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent) 0%, #0d9488 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .header-info h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .header-info p {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--accent) 0%, #0d9488 100%);
        }

        .message.user .message-avatar {
            background: var(--ai-bubble);
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.ai .message-content {
            background: var(--ai-bubble);
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .message-content p {
            margin-bottom: 8px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content strong {
            color: var(--accent);
        }

        .message-content a {
            color: var(--accent);
            text-decoration: underline;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            gap: 12px;
            max-width: 85%;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 16px;
            background: var(--ai-bubble);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .quick-action {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-action:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Input Area */
        .input-area {
            padding: 16px 0;
            border-top: 1px solid var(--border);
            margin-top: 16px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px;
            transition: border-color 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            padding: 8px 12px;
        }

        .input-wrapper input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Booking Form (Hidden by default) */
        .booking-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .booking-overlay.active {
            display: flex;
        }

        .booking-form {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .booking-form h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .booking-form p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .booking-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            border-color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .chat-container { padding: 16px; }
            .message { max-width: 95%; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>

        // Select prompt based on current language
        function getSystemPrompt() {
            var lang = window.__langSystem ? window.__langSystem.getCurrentLang() : 'en';
            return lang === 'fr' ? SYSTEM_PROMPT_FR : SYSTEM_PROMPT_EN;
        }

        function getLang() {
            return window.__langSystem ? window.__langSystem.getCurrentLang() : 'en';
        }

        // Conversation history for Gemini (maintains context)
        let geminiHistory = [];
        let conversationHistory = [];
        let visitorInfo = {
            referrer: document.referrer || 'direct',
            company: null
        };
        let isProcessing = false;

        // Initialize chat
        function initChat() {
            if (visitorInfo.referrer && visitorInfo.referrer !== 'direct') {
                try {
                    const url = new URL(visitorInfo.referrer);
                    visitorInfo.company = url.hostname.replace('www.', '').split('.')[0];
                } catch(e) {}
            }

            const greeting = generateGreeting();
            addMessage('ai', greeting);
        }

        function generateGreeting() {
            var lang = getLang();

            if (lang === 'fr') {
                const greetingsFr = [
                    "Bonjour. Je suis le bot FAQ d'Owen — propulsé par Gemini, donc un peu plus malin qu'un widget normal. Posez-moi n'importe quoi.",
                    "Salut. Je connais les compétences d'Owen, son parcours, sa fourchette salariale, et son avis sur le pain français. Qu'est-ce qui vous intéresse ?",
                    "Bienvenue. Je suis essentiellement une page FAQ avec une personnalité. Posez vos questions."
                ];
                return greetingsFr[Math.floor(Math.random() * greetingsFr.length)];
            }

            const greetings = [
                "Hey. I'm Owen's FAQ bot, powered by Gemini — so a step up from a normal widget. Ask me anything.",
                "Hi there. I know Owen's skills, background, salary range, and his opinions on French bread. What do you want to know?",
                "Welcome. I'm basically a FAQ page with a personality. Go ahead.",
                "Hey. I know more about Owen than is probably healthy. Ask away."
            ];
            return greetings[Math.floor(Math.random() * greetings.length)];
        }

        function addMessage(type, content) {
            const messagesDiv = document.getElementById('messages');
            const message = document.createElement('div');
            message.className = `message ${type}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = type === 'ai' ? '🤖' : '👤';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);

            message.appendChild(avatar);
            message.appendChild(contentDiv);
            messagesDiv.appendChild(message);

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            conversationHistory.push({ type, content, timestamp: new Date().toISOString() });
        }

        function formatMessage(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
                .replace(/• /g, '&bull; ');
        }

        function showTyping() {
            document.getElementById('typingIndicator').classList.add('active');
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typingIndicator').classList.remove('active');
        }

        // Call Gemini API — uses current language's system prompt
        async function callGemini(userMessage) {
            geminiHistory.push({ role: 'user', parts: [{ text: userMessage }] });

            const requestBody = {
                system_instruction: {
                    parts: [{ text: getSystemPrompt() }]
                },
                contents: geminiHistory,
                generationConfig: {
                    temperature: 0.8,
                    topP: 0.95,
                    topK: 40,
                    maxOutputTokens: 1024
                }
            };

            try {
                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('Gemini API error:', response.status, errorData);

                    if (response.status === 400 && GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY_HERE') {
                        if (getLang() === 'fr') {
                            return "⚠️ La clé API n'a pas encore été configurée. Owen doit ajouter sa clé API Gemini pour m'activer. En attendant, explorez son portfolio sur **omccormick.com** ou contactez-le directement à **mcmcowen@gmail.com** !";
                        }
                        return "⚠️ The API key hasn't been configured yet. Owen needs to add his Gemini API key to activate me. In the meantime, feel free to explore his portfolio at **omccormick.com** or reach out directly at **mcmcowen@gmail.com**!";
                    }
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!aiResponse) {
                    throw new Error('No response from Gemini');
                }

                geminiHistory.push({ role: 'model', parts: [{ text: aiResponse }] });

                if (geminiHistory.length > 40) {
                    geminiHistory = geminiHistory.slice(-40);
                }

                return aiResponse;

            } catch (error) {
                console.error('Gemini call failed:', error);
                if (getLang() === 'fr') {
                    return "J'ai un petit souci de connexion en ce moment, mais je ne veux pas que vous partiez les mains vides ! Voici le pitch rapide :\n\n**Owen McCormick** est un Consultant en Opérations Stratégiques qui construit des outils IA et des systèmes d'automatisation. Il recherche son prochain poste à temps plein.\n\n• **Email :** mcmcowen@gmail.com\n• **Portfolio :** omccormick.com\n• **LinkedIn :** linkedin.com/in/owenpmccormick\n\nRéessayez dans un instant, ou contactez-le directement !";
                }
                return "I'm having a little trouble connecting right now, but I don't want you to leave empty-handed! Here's the quick pitch:\n\n**Owen McCormick** is a Strategic Operations Consultant who builds AI-powered tools and automation systems. He's looking for his next full-time role.\n\n• **Email:** mcmcowen@gmail.com\n• **Portfolio:** omccormick.com\n• **LinkedIn:** linkedin.com/in/owenpmccormick\n\nTry asking again in a moment, or reach out to him directly!";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();

            if (!message || isProcessing) return;

            isProcessing = true;
            addMessage('user', message);
            input.value = '';

            document.getElementById('quickActions').style.display = 'none';
            document.getElementById('sendBtn').disabled = true;

            showTyping();

            try {
                const msgLower = message.toLowerCase();
                if (msgLower.includes('schedule') || msgLower.includes('book') || msgLower.includes('meet') || msgLower.includes('call') || msgLower.includes('interview') || msgLower.includes('planifier') || msgLower.includes('appel') || msgLower.includes('rendez-vous') || msgLower.includes('entretien')) {
                    openBooking();
                }

                const response = await callGemini(message);
                hideTyping();
                addMessage('ai', response);
            } catch (error) {
                hideTyping();
                if (getLang() === 'fr') {
                    addMessage('ai', "Quelque chose n'a pas fonctionné de mon côté. Vous pouvez toujours contacter Owen directement à **mcmcowen@gmail.com** — il serait ravi de vous entendre !");
                } else {
                    addMessage('ai', "Something went wrong on my end. You can always reach Owen directly at **mcmcowen@gmail.com** — he'd love to hear from you!");
                }
            } finally {
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // Quick message — reads data-msg attribute based on language
        function sendQuickMessage(btn) {
            var lang = getLang();
            var msg = btn.getAttribute('data-msg-' + lang) || btn.getAttribute('data-msg-en') || btn.textContent;
            document.getElementById('userInput').value = msg;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Booking functions
        function openBooking() {
            document.getElementById('bookingOverlay').classList.add('active');
        }

        function closeBooking() {
            document.getElementById('bookingOverlay').classList.remove('active');
        }

            } else {
                addMessage('ai', `Perfect! I've sent your request to Owen. Here's what he'll receive:\n\n• **Name:** ${data.name}\n• **Company:** ${data.company || 'Not specified'}\n• **Email:** ${data.email}\n• **Role:** ${data.role || 'Not specified'}\n• **Preferred time:** ${data.timePreference}\n\nHe typically responds within 24 hours. In the meantime, feel free to keep chatting with me or explore his portfolio!\n\n*Psst: He also gets a transcript of our conversation, so he'll come prepared.* 😉`);
            }

            form.reset();
        }

        // Initialize on load
        window.addEventListener('load', initChat);
    </script>
